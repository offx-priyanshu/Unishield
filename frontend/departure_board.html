<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOX — Departure Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2236;--cyan:#00e5ff;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--border:#1e2d40}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:24px}
.page-title{font-size:24px;font-weight:800;margin-bottom:24px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:20px;overflow-x:auto}
.tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1px;white-space:nowrap;color:var(--muted);border:none;background:transparent}
.tab:hover{color:var(--text);background:var(--card2)}
.tab.active[data-tab="PENDING"]{background:var(--yellow);color:#000}
.tab.active[data-tab="APPROVED"]{background:var(--cyan);color:#000}
.tab.active[data-tab="ACTIVE"]{background:var(--green);color:#000}
.tab.active[data-tab="COMPLETED"]{background:var(--muted);color:#000}
.tab.active[data-tab="REJECTED"]{background:var(--red);color:#fff}
.cnt{min-width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;padding:0 6px;background:rgba(255,255,255,.1)}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.row{display:grid;grid-template-columns:100px 150px 1fr 60px 130px 160px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center}
.row.header{font-size:11px;color:var(--muted);letter-spacing:1px}
.row:last-child{border-bottom:none}
.row:not(.header):hover{background:var(--card2)}
.sid{color:var(--cyan);font-weight:700;font-size:13px;cursor:pointer}
.name{font-weight:600;font-size:13px}
.sub{font-size:11px;color:var(--muted);margin-top:2px}
.dur{font-size:13px;font-weight:700;color:var(--cyan)}
.ts{font-size:12px;font-family:monospace;color:var(--muted)}
.action-btns{display:flex;gap:6px}
.btn-a{background:rgba(16,185,129,.15);border:1px solid var(--green);color:var(--green);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn-r{background:rgba(239,68,68,.1);border:1px solid var(--red);color:var(--red);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:440px}
.modal h3{font-size:16px;font-weight:800;color:var(--red);letter-spacing:1px;margin-bottom:16px}
.modal select,.modal textarea{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:13px;outline:none;margin-bottom:12px;font-family:inherit}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:13px;letter-spacing:1px}
.btn-cancel{background:var(--card2);color:var(--text)}
.btn-confirm{background:var(--red);color:#fff}
</style>
</head>
<body>
<div class="page-title">Security Departure Board</div>
<div class="tabs">
  <button class="tab active" data-tab="PENDING" onclick="switchTab('PENDING')">PENDING <span class="cnt" id="cnt-PENDING">0</span></button>
  <button class="tab" data-tab="APPROVED" onclick="switchTab('APPROVED')">AUTHORIZED <span class="cnt" id="cnt-APPROVED">0</span></button>
  <button class="tab" data-tab="ACTIVE" onclick="switchTab('ACTIVE')">ACTIVE <span class="cnt" id="cnt-ACTIVE">0</span></button>
  <button class="tab" data-tab="COMPLETED" onclick="switchTab('COMPLETED')">COMPLETED <span class="cnt" id="cnt-COMPLETED">0</span></button>
  <button class="tab" data-tab="REJECTED" onclick="switchTab('REJECTED')">REJECTED <span class="cnt" id="cnt-REJECTED">0</span></button>
</div>
<div class="table-card" id="table-card"><div class="empty">Loading...</div></div>
<div class="modal-overlay" id="reject-modal">
  <div class="modal">
    <h3>REJECT OUTPASS</h3>
    <input type="hidden" id="reject-id">
    <select id="reject-reason-select" onchange="document.getElementById('reject-custom').value=this.value==='custom'?'':this.value">
      <option value="">Select reason...</option>
      <option>Insufficient academic performance</option>
      <option>Previous violations on record</option>
      <option>Outside permitted hours</option>
      <option>Incomplete request information</option>
      <option value="custom">Custom...</option>
    </select>
    <textarea id="reject-custom" rows="3" placeholder="Custom reason..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-confirm" onclick="confirmReject()">CONFIRM REJECT</button>
    </div>
  </div>
</div>
<script>
const API='http://127.0.0.1:5000';
let currentTab='PENDING',allData={};

async function fetchAll(){
  for(const s of ['PENDING','APPROVED','ACTIVE','COMPLETED','REJECTED']){
    try{
      const r=await fetch(`${API}/api/outpass/all?status=${s}`);
      allData[s]=await r.json();
      document.getElementById(`cnt-${s}`).textContent=allData[s].length;
    }catch{allData[s]=[]}
  }
  renderTable(currentTab);
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  renderTable(tab);
}

function renderTable(tab){
  const data=allData[tab]||[];
  const card=document.getElementById('table-card');
  const headers=['SID','STUDENT','DESTINATION / PURPOSE','HRS','TIME','ACTION'];
  let html=`<div class="row header">${headers.map(h=>`<div>${h}</div>`).join('')}</div>`;
  if(!data.length){html+='<div class="empty">NO ACTIVITY IN QUEUE</div>';}
  else data.forEach(r=>{
    const time=r.requested_at||r.approved_at||'—';
    const tFormatted=new Date((time||'').replace(' ','T')).toLocaleString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    html+=`<div class="row">
      <div><span class="sid" onclick="window.location='/violation_history.html?sid=${r.sid}'">${r.sid}</span></div>
      <div><div class="name">${r.student_name||'—'}</div></div>
      <div><div>${r.destination||'—'}</div><div class="sub">${(r.purpose||'').substring(0,40)}</div></div>
      <div class="dur">${r.duration_hours}H</div>
      <div class="ts">${tFormatted}</div>
      <div>${tab==='PENDING'?`<div class="action-btns"><button class="btn-a" onclick="approve(${r.id})">APPROVE</button><button class="btn-r" onclick="openReject(${r.id})">REJECT</button></div>`:
        tab==='APPROVED'?`<span style="color:var(--cyan);font-size:11px;font-weight:700">QR READY</span>`:
        tab==='ACTIVE'?`<span style="color:var(--green);font-size:11px;font-weight:700">OUT</span>`:
        tab==='COMPLETED'?`<span style="color:var(--muted);font-size:11px">DONE</span>`:
        `<span style="color:var(--red);font-size:11px">${(r.rejection_reason||'').substring(0,25)}</span>`}</div>
    </div>`;
  });
  card.innerHTML=html;
}

async function approve(id){
  if(!confirm('Approve this outpass?'))return;
  const r=await fetch(`${API}/api/outpass/approve/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approved_by:localStorage.getItem('admin_key')||'admin'})});
  const d=await r.json();
  if(d.success){fetchAll();showToast('Outpass approved!','green')}
}

function openReject(id){document.getElementById('reject-id').value=id;document.getElementById('reject-modal').classList.add('show')}
function closeModal(){document.getElementById('reject-modal').classList.remove('show')}

async function confirmReject(){
  const id=document.getElementById('reject-id').value;
  const reason=document.getElementById('reject-custom').value.trim()||document.getElementById('reject-reason-select').value;
  if(!reason){alert('Enter a reason');return}
  await fetch(`${API}/api/outpass/reject/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})});
  closeModal();fetchAll();showToast('Outpass rejected','red');
}

function showToast(msg,color){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--${color==='green'?'green':'red'});color:var(--${color==='green'?'green':'red'});padding:12px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;letter-spacing:1px`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

fetchAll();setInterval(fetchAll,15000);
</script>
</body>
</html>
