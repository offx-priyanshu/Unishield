<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOX — Gate Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2236;--cyan:#00e5ff;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--border:#1e2d40}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{font-size:18px;font-weight:800;color:var(--cyan);letter-spacing:3px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1000px;margin:0 auto}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:12px;color:var(--cyan);letter-spacing:2px;font-weight:700;margin-bottom:16px}
.scanner-container{position:relative;border-radius:10px;overflow:hidden;background:#000}
#scanner-video{width:100%;display:block;border-radius:10px}
.scan-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.corner{position:absolute;width:40px;height:40px;border-color:var(--cyan);border-style:solid}
.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;left:10px;right:10px;top:50%;height:2px;background:var(--cyan);animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:20%}50%{top:80%}}
.scan-status{text-align:center;padding:12px;font-size:12px;color:var(--muted);letter-spacing:1px}
.scan-status.scanning{color:var(--cyan)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;margin-top:12px}
.btn-cyan{background:var(--cyan);color:#000}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.manual-form{display:flex;gap:10px;margin-bottom:12px}
.input-field{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:13px;outline:none;font-family:monospace;letter-spacing:2px}
.input-field:focus{border-color:var(--cyan)}
.btn-verify{background:var(--cyan);color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
.result-box{border-radius:10px;padding:20px;display:none}
.result-box.verified{background:rgba(16,185,129,.1);border:2px solid var(--green);display:block}
.result-box.invalid{background:rgba(239,68,68,.1);border:2px solid var(--red);display:block}
.result-title{font-size:20px;font-weight:800;text-align:center;letter-spacing:3px;margin-bottom:16px}
.result-box.verified .result-title{color:var(--green)}
.result-box.invalid .result-title{color:var(--red)}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result-field{background:var(--card2);border-radius:6px;padding:10px 12px}
.result-field label{font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px}
.result-field span{font-size:13px;font-weight:600}
.result-field.full{grid-column:1/-1}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btn-exit{background:var(--cyan);color:#000;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn-return{background:var(--green);color:#000;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;letter-spacing:1px}
.scan-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.scan-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scan-dot.ok{background:var(--green)}
.scan-dot.fail{background:var(--red)}
.scan-info{flex:1}
.scan-name{font-size:13px;font-weight:600}
.scan-detail{font-size:11px;color:var(--muted)}
.scan-time{font-size:11px;color:var(--muted);font-family:monospace}
</style>
</head>
<body>
<div style="max-width:1000px;margin:0 auto">
  <div class="header">
    <div class="logo">SNOX</div>
    <div style="font-size:13px;color:var(--muted)">Gate Scanner Terminal</div>
  </div>
  <div class="layout">
    <div>
      <div class="card">
        <div class="card-title">LIVE QR SCANNER</div>
        <div class="scanner-container">
          <video id="scanner-video" playsinline muted></video>
          <canvas id="scanner-canvas" style="display:none"></canvas>
          <div class="scan-overlay">
            <div style="position:relative;width:200px;height:200px">
              <div class="corner tl"></div><div class="corner tr"></div>
              <div class="corner bl"></div><div class="corner br"></div>
              <div class="scan-line"></div>
            </div>
          </div>
        </div>
        <div class="scan-status" id="scan-status">Camera not started</div>
        <button class="btn btn-cyan" id="start-btn" onclick="startCamera()">START CAMERA</button>
        <button class="btn btn-outline" id="stop-btn" onclick="stopCamera()" style="display:none">STOP CAMERA</button>
      </div>
      <div class="card" style="margin-top:16px">
        <div class="card-title">MANUAL TOKEN INPUT</div>
        <div class="manual-form">
          <input type="text" class="input-field" id="manual-input" placeholder="Enter QR Token..." onkeydown="if(event.key==='Enter')verifyManual()">
          <button class="btn-verify" onclick="verifyManual()">VERIFY</button>
        </div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">VERIFICATION RESULT</div>
        <div class="result-box" id="result-box">
          <div class="result-title" id="result-title">—</div>
          <div class="result-grid" id="result-grid"></div>
          <div class="action-btns" id="action-btns" style="display:none">
            <button class="btn-exit" onclick="markAction('exit')">MARK EXIT</button>
            <button class="btn-return" onclick="markAction('return')">MARK RETURN</button>
          </div>
        </div>
        <div id="empty-result" style="text-align:center;color:var(--muted);padding:40px;font-size:13px">Scan a QR code to verify</div>
      </div>
      <div class="card">
        <div class="card-title">RECENT SCANS</div>
        <div id="scan-log"><div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">No scans yet</div></div>
      </div>
    </div>
  </div>
</div>
<script>
const API='http://127.0.0.1:5000';
let videoStream=null,scanInterval=null,lastScan='',currentOutpassId=null,scanHistory=[];

async function startCamera(){
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('scanner-video');v.srcObject=videoStream;v.play();
    document.getElementById('start-btn').style.display='none';
    document.getElementById('stop-btn').style.display='block';
    document.getElementById('scan-status').textContent='Scanning...';
    document.getElementById('scan-status').className='scan-status scanning';
    scanInterval=setInterval(scanFrame,300);
  }catch(e){alert('Camera access denied')}
}
function stopCamera(){
  if(videoStream)videoStream.getTracks().forEach(t=>t.stop());
  if(scanInterval)clearInterval(scanInterval);
  document.getElementById('start-btn').style.display='block';
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('scan-status').textContent='Camera stopped';
  document.getElementById('scan-status').className='scan-status';
}
function scanFrame(){
  const v=document.getElementById('scanner-video'),c=document.getElementById('scanner-canvas');
  if(!v.videoWidth)return;
  c.width=v.videoWidth;c.height=v.videoHeight;
  const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
  const img=ctx.getImageData(0,0,c.width,c.height);
  const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
  if(code&&code.data!==lastScan){
    lastScan=code.data;
    const parts=code.data.split('|');
    if(parts[0]==='SNOX'&&parts[1])verifyToken(parts[1]);
    else showResult(false,null,'Invalid QR format');
    setTimeout(()=>{lastScan=''},3000);
  }
}
async function verifyToken(token){
  try{
    const res=await fetch(`${API}/api/outpass/verify-qr`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
    const d=await res.json();
    showResult(d.valid,d,d.valid?'':(d.reason||'Invalid'));
  }catch(e){showResult(false,null,'Server error')}
}
function verifyManual(){
  const v=document.getElementById('manual-input').value.trim();
  if(v)verifyToken(v);
}
function showResult(valid,data,reason){
  document.getElementById('empty-result').style.display='none';
  const box=document.getElementById('result-box');
  box.className=`result-box ${valid?'verified':'invalid'}`;
  document.getElementById('result-title').textContent=valid?'VERIFIED — CLEAR':`REJECTED — ${reason.toUpperCase()}`;
  if(valid&&data){
    currentOutpassId=data.outpass_id;
    document.getElementById('result-grid').innerHTML=`
      <div class="result-field"><label>NAME</label><span>${data.student_name}</span></div>
      <div class="result-field"><label>SID</label><span>${data.sid}</span></div>
      <div class="result-field full"><label>DESTINATION</label><span>${data.destination}</span></div>
      <div class="result-field full"><label>RETURN BY</label><span style="color:var(--yellow)">${data.expected_return}</span></div>`;
    document.getElementById('action-btns').style.display='grid';
  }else{
    currentOutpassId=null;
    document.getElementById('result-grid').innerHTML=`<div class="result-field full"><label>REASON</label><span style="color:var(--red)">${reason}</span></div>`;
    document.getElementById('action-btns').style.display='none';
  }
  scanHistory.unshift({valid,name:data?.student_name||'Unknown',detail:valid?data?.destination:reason,time:new Date().toLocaleTimeString('en-IN')});
  document.getElementById('scan-log').innerHTML=scanHistory.slice(0,15).map(s=>`
    <div class="scan-item"><div class="scan-dot ${s.valid?'ok':'fail'}"></div>
    <div class="scan-info"><div class="scan-name">${s.name}</div><div class="scan-detail">${s.detail}</div></div>
    <div class="scan-time">${s.time}</div></div>`).join('');
}
async function markAction(type){
  if(!currentOutpassId)return;
  await fetch(`${API}/api/outpass/${type==='exit'?'exit':'return'}/${currentOutpassId}`,{method:'POST',headers:{'Content-Type':'application/json'}});
  alert(`Student ${type==='exit'?'EXIT':'RETURN'} recorded!`);
  document.getElementById('action-btns').style.display='none';
}
</script>
</body>
</html>
