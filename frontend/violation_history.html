<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNOX — Violation History</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2236;--cyan:#00e5ff;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--text:#e2e8f0;--muted:#64748b;--border:#1e2d40}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:24px}
.back{color:var(--cyan);font-size:12px;cursor:pointer;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px;letter-spacing:1px;border:none;background:none}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.pt{font-size:22px;font-weight:800;margin-bottom:4px}
.ps{font-size:13px;color:var(--muted)}
.header-acts{display:flex;gap:10px}
.btn{padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;border:none}
.btn-add{background:var(--red);color:#fff}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--muted)}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;gap:20px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--card2);border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--cyan);flex-shrink:0}
.sname{font-size:18px;font-weight:800;margin-bottom:4px}
.ssid{font-size:13px;color:var(--cyan);letter-spacing:2px;margin-bottom:4px}
.sdept{font-size:12px;color:var(--muted)}
.meter{text-align:center}
.meter-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px}
.meter-bar{width:120px;height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:0 auto 6px}
.mfill{height:100%;border-radius:4px;transition:width .5s}
.mfill.safe{background:var(--green)}.mfill.warn{background:var(--yellow)}.mfill.danger{background:var(--orange)}.mfill.critical{background:var(--red)}
.mcount{font-size:22px;font-weight:800}
.mcount.safe{color:var(--green)}.mcount.warn{color:var(--yellow)}.mcount.danger{color:var(--orange)}.mcount.critical{color:var(--red)}
.badge-ok{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;background:rgba(16,185,129,.15);border:1px solid var(--green);color:var(--green)}
.badge-bl{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);animation:flicker 1.5s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.6}}
.sec-title{font-size:12px;color:var(--cyan);letter-spacing:2px;font-weight:700;margin-bottom:16px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)}
.ti{position:relative;margin-bottom:16px}
.tdot{position:absolute;left:-24px;top:14px;width:14px;height:14px;border-radius:50%;border:2px solid}
.tdot.low{background:rgba(245,158,11,.2);border-color:var(--yellow)}
.tdot.medium{background:rgba(249,115,22,.2);border-color:var(--orange)}
.tdot.high{background:rgba(239,68,68,.2);border-color:var(--red)}
.tdot.critical{background:rgba(239,68,68,.3);border-color:var(--red);box-shadow:0 0 8px rgba(239,68,68,.5);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(239,68,68,.5)}50%{box-shadow:0 0 20px rgba(239,68,68,.8)}}
.vc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.vc.low{border-left:3px solid var(--yellow)}.vc.medium{border-left:3px solid var(--orange)}.vc.high{border-left:3px solid var(--red)}.vc.critical{border-left:3px solid var(--red);background:rgba(239,68,68,.05)}
.vct{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.vcr{font-size:14px;font-weight:600;flex:1}
.sb{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:2px}
.sb.low{background:rgba(245,158,11,.15);color:var(--yellow)}.sb.medium{background:rgba(249,115,22,.15);color:var(--orange)}.sb.high{background:rgba(239,68,68,.15);color:var(--red)}.sb.critical{background:rgba(239,68,68,.25);color:var(--red);border:1px solid var(--red)}
.vcm{display:flex;gap:16px;flex-wrap:wrap}
.vcmi{font-size:11px;color:var(--muted)}
.vcn{margin-top:8px;font-size:12px;color:var(--muted);background:var(--card2);padding:8px 10px;border-radius:6px}
.empty{text-align:center;padding:60px;color:var(--muted)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:460px;max-width:95vw}
.modal h3{font-size:16px;font-weight:800;color:var(--red);letter-spacing:1px;margin-bottom:20px}
.fg{margin-bottom:16px}
.fl{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;display:block}
.fs,.ft,.fi{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.ft{resize:vertical;min-height:80px}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--cyan)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sb2{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:8px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;text-align:center}
.sb2.selected[data-sev="LOW"]{background:rgba(245,158,11,.15);border-color:var(--yellow);color:var(--yellow)}
.sb2.selected[data-sev="MEDIUM"]{background:rgba(249,115,22,.15);border-color:var(--orange);color:var(--orange)}
.sb2.selected[data-sev="HIGH"]{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.sb2.selected[data-sev="CRITICAL"]{background:rgba(239,68,68,.25);border-color:var(--red);color:var(--red)}
.mbtns{display:flex;gap:10px;margin-top:20px}
.mbtns button{flex:1;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:13px;letter-spacing:1px}
.btn-mc{background:var(--card2);color:var(--text)}
.btn-ms{background:var(--red);color:#fff}
.wbox{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--red);margin-top:12px;display:none}
.wbox.show{display:block}
</style>
</head>
<body>
<button class="back" onclick="history.back()">← BACK</button>
<div class="ph">
  <div><div class="pt">Violation History</div><div class="ps" id="ps">Loading...</div></div>
  <div class="header-acts">
    <button class="btn btn-reset" id="rbtn" onclick="confirmReset()" style="display:none">RESET</button>
    <button class="btn btn-add" onclick="openModal()">+ ADD VIOLATION</button>
  </div>
</div>
<div class="sc" id="sc"><div style="color:var(--muted)">Loading...</div></div>
<div class="sec-title">VIOLATION TIMELINE</div>
<div id="timeline"></div>
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>ADD VIOLATION RECORD</h3>
    <div class="fg"><label class="fl">REASON</label>
    <select class="fs" id="rsel" onchange="document.getElementById('rcust').value=this.value==='custom'?'':this.value">
      <option value="">Select...</option>
      <option>Returned late from outpass</option>
      <option>Unauthorized exit attempt</option>
      <option>No outpass — found outside campus</option>
      <option>Misconduct at gate</option>
      <option>Forged outpass attempt</option>
      <option value="custom">Custom...</option>
    </select></div>
    <div class="fg"><label class="fl">CUSTOM REASON</label><input type="text" class="fi" id="rcust" placeholder="Enter specific reason..."></div>
    <div class="fg"><label class="fl">SEVERITY</label>
    <div class="sg">
      <button class="sb2 selected" data-sev="LOW" onclick="selSev('LOW')">LOW</button>
      <button class="sb2" data-sev="MEDIUM" onclick="selSev('MEDIUM')">MEDIUM</button>
      <button class="sb2" data-sev="HIGH" onclick="selSev('HIGH')">HIGH</button>
      <button class="sb2" data-sev="CRITICAL" onclick="selSev('CRITICAL')">CRITICAL</button>
    </div></div>
    <div class="fg"><label class="fl">NOTES (OPTIONAL)</label><textarea class="ft" id="vnotes" placeholder="Additional context..."></textarea></div>
    <div class="wbox" id="wbox">⚠ Adding this violation will AUTO-BLACKLIST this student.</div>
    <div class="mbtns"><button class="btn-mc" onclick="closeModal()">CANCEL</button><button class="btn-ms" onclick="submitViolation()">RECORD VIOLATION</button></div>
  </div>
</div>
<script>
const API='http://127.0.0.1:5000';
const sid=new URLSearchParams(window.location.search).get('sid')||'DEMO';
let vdata=[],count=0,limit=3,selSeverity='LOW',stu=null;

async function load(){
  try{
    const[sr,vr]=await Promise.all([fetch(`${API}/api/students/${sid}`),fetch(`${API}/api/violations/${sid}`)]);
    stu=await sr.json();
    const vd=await vr.json();
    vdata=vd.violations||[];count=vd.count||0;limit=vd.limit||3;
    renderStudent();renderTimeline();
  }catch{
    stu={sid:'DEMO_SID',full_name:'Demo Student',department:'CSE',year:2,security_access:'APPROVED'};
    vdata=[{id:1,reason:'Returned late from outpass',severity:'HIGH',added_by:'ADMIN',notes:'3 hours late',added_at:'2026-04-03 14:30:00'}];
    count=1;limit=3;
    renderStudent();renderTimeline();
  }
}

function renderStudent(){
  if(!stu)return;
  const pct=Math.min(100,(count/limit)*100);
  const lvl=pct<34?'safe':pct<67?'warn':pct<100?'danger':'critical';
  const ini=(stu.full_name||'XX').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const bl=stu.security_access==='BLACKLISTED';
  document.getElementById('sc').innerHTML=`
    <div class="avatar">${ini}</div>
    <div style="flex:1">
      <div class="sname">${stu.full_name}</div>
      <div class="ssid">SID #${stu.sid}</div>
      <div class="sdept">${stu.department||'—'} ${stu.year?`(Year ${stu.year})`:''}</div>
      <div style="margin-top:8px"><span class="${bl?'badge-bl':'badge-ok'}">${bl?'🔒 BLACKLISTED':'✓ CLEARED'}</span></div>
    </div>
    <div class="meter">
      <div class="meter-label">VIOLATIONS</div>
      <div class="meter-bar"><div class="mfill ${lvl}" style="width:${pct}%"></div></div>
      <div class="mcount ${lvl}">${count} / ${limit}</div>
    </div>`;
  document.getElementById('ps').textContent=`${stu.full_name} — ${count} violation${count!==1?'s':''} on record`;
  document.getElementById('rbtn').style.display='block';
}

function renderTimeline(){
  const c=document.getElementById('timeline');
  if(!vdata.length){c.innerHTML='<div class="empty">✓ No Violations on Record</div>';return}
  c.innerHTML=`<div class="timeline">${vdata.map(v=>`
    <div class="ti"><div class="tdot ${v.severity.toLowerCase()}"></div>
    <div class="vc ${v.severity.toLowerCase()}">
      <div class="vct"><div class="vcr">${v.reason}</div><span class="sb ${v.severity.toLowerCase()}">${v.severity}</span></div>
      <div class="vcm"><div class="vcmi">📅 ${fmtDate(v.added_at)}</div><div class="vcmi">👤 ${v.added_by||'—'}</div></div>
      ${v.notes?`<div class="vcn">${v.notes}</div>`:''}
    </div></div>`).join('')}</div>`;
}

function fmtDate(ts){if(!ts)return'—';return new Date(ts.replace(' ','T')).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}

function openModal(){
  const rem=limit-count;
  document.getElementById('wbox').classList.toggle('show',rem<=1);
  document.getElementById('add-modal').classList.add('show');
}
function closeModal(){document.getElementById('add-modal').classList.remove('show')}
function selSev(s){selSeverity=s;document.querySelectorAll('.sb2').forEach(b=>b.classList.toggle('selected',b.dataset.sev===s))}

async function submitViolation(){
  const reason=document.getElementById('rcust').value.trim()||document.getElementById('rsel').value;
  if(!reason||reason==='custom'){alert('Enter a reason');return}
  try{
    const r=await fetch(`${API}/api/violations/add`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sid,reason,severity:selSeverity,added_by:localStorage.getItem('admin_key')||'admin',notes:document.getElementById('vnotes').value})});
    const d=await r.json();
    if(d.success){closeModal();if(d.blacklisted)alert('⚠ Student AUTO-BLACKLISTED!');load()}
  }catch{
    closeModal();vdata.unshift({id:Date.now(),reason,severity:selSeverity,added_by:'DEMO',notes:'',added_at:new Date().toISOString()});
    count++;renderStudent();renderTimeline();
  }
}

async function confirmReset(){
  if(!confirm(`Reset all violations for ${stu?.full_name}?`))return;
  try{await fetch(`${API}/api/violations/reset/${sid}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reset_by:'admin'})})}catch{}
  vdata=[];count=0;if(stu)stu.security_access='APPROVED';renderStudent();renderTimeline();
}
load();
</script>
</body>
</html>
