{% extends "base.html" %}

{% block page_title %}Edit Student Profile{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto; padding: 3rem;">
    <div style="text-align: center; margin-bottom: 3rem;">
        <i class="fas fa-user-edit" style="font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem;"></i>
        <h1 style="color: white; margin-bottom: 0.5rem;">Update Student Profile</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Modify credentials and biometric associations for <strong>{{ s.student_id }}</strong></p>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ s.name }}" placeholder="Legal Name" required>
            </div>
            <div class="form-group">
                <label>Student ID / PRN</label>
                <input type="text" value="{{ s.student_id }}" disabled style="opacity: 0.6; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ s.email }}" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" value="{{ s.phone }}" placeholder="+91 XXXX" required>
            </div>
            <div class="form-group">
                <label>Parent/Guardian Phone</label>
                <input type="text" name="parent_phone" value="{{ s.parent_phone }}" placeholder="+91 XXXX" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select name="department" required>
                    {% set depts = ['SOET-FE', 'SOET-ME', 'SOET-EE', 'SOET-CE', 'SOCSE', 'SOCMS', 'SOAS', 'SNJSOE', 'SOLIS', 'SOL'] %}
                    {% for d in depts %}
                        <option value="{{ d }}" {{ 'selected' if s.department == d }}>{{ d }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Year of Study</label>
                <select name="year" required>
                    <option value="1" {{ 'selected' if s.year == 1 }}>1st Year</option>
                    <option value="2" {{ 'selected' if s.year == 2 }}>2nd Year</option>
                    <option value="3" {{ 'selected' if s.year == 3 }}>3rd Year</option>
                    <option value="4" {{ 'selected' if s.year == 4 }}>4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Hostel Room (Optional)</label>
                <input type="text" name="hostel_room" value="{{ s.hostel_room }}" placeholder="Block - Room">
            </div>
        </div>



        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 2; justify-content: center; padding: 1.25rem;">
                SAVE CHANGES <i class="fas fa-save" style="margin-left: 0.75rem;"></i>
            </button>
            <a href="{{ url_for('admin.students') }}" class="btn btn-ghost" style="flex: 1; justify-content: center;">
                CANCEL
            </a>
        </div>
    </form>
</div>

<style>
    .form-group label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
        letter-spacing: 1px;
        color: var(--text-muted);
    }
</style>
{% endblock %}
