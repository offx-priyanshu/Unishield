{% extends "base.html" %}

{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto; padding: 3rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-key" style="font-size: 3rem; color: var(--accent); margin-bottom: 1.5rem;"></i>
        <h2 style="margin-bottom: 0.5rem;">Change Password</h2>
        <p style="font-size: 0.8rem; color: var(--text-muted);">Please verify your identity and set a new secure passcode.</p>
    </div>

    <form method="POST">
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Current Password</label>
            <input type="password" name="old_password" placeholder="Enter current password" required>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">New Password</label>
            <input type="password" name="new_password" placeholder="Min 6 characters" required>
        </div>

        <div style="margin-bottom: 2.5rem;">
            <label style="display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Repeat new password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
            UPDATE CREDENTIALS <i class="fas fa-shield-alt" style="margin-left: 0.5rem;"></i>
        </button>
        
        <a href="javascript:history.back()" class="btn btn-ghost" style="width: 100%; justify-content: center; margin-top: 1rem;">
            CANCEL
        </a>
    </form>
</div>
{% endblock %}
