<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandip University - Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #00d2ff;
      --primary-dim: rgba(0, 210, 255, 0.1);
      --bg-dark: #000000;
      --panel-bg: rgba(15, 20, 35, 0.4);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #8b9bb4;
      --input-bg: rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 0% 0%, #061c3a 0%, #020813 40%, var(--bg-dark) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Glow Background Effect */
    body::before {
      content: '';
      position: absolute;
      bottom: -20vh;
      right: -10vw;
      width: 60vw;
      height: 60vh;
      background: radial-gradient(circle at center, rgba(0, 210, 255, 0.08) 0%, transparent 60%);
      filter: blur(100px);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      max-width: 1040px;
      min-height: 620px;
      background: var(--panel-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    /* LEFT PANEL */
    .left-panel {
      flex: 1;
      padding: 56px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--panel-border);
      position: relative;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0.2) 100%);
      overflow: hidden;
    }

    /* Subtle glow accent */
    .left-panel::before {
      content: '';
      position: absolute;
      top: -150px;
      left: -150px;
      width: 350px;
      height: 350px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.12;
      border-radius: 50%;
      pointer-events: none;
    }

    .brand-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: auto;
      position: relative;
      z-index: 2;
    }

    .brand-logo {
      width: 110px;
      height: auto;
      margin-bottom: 12px;
    }

    .brand-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }

    .hero-content {
      margin-top: 40px;
      margin-bottom: auto;
      position: relative;
      z-index: 2;
    }

    .hero-title {
      font-size: 46px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 18px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      letter-spacing: -0.5px;
    }

    .hero-desc {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 48px;
    }

    .feature-tags {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .feature-tag {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      width: fit-content;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .feature-tag:hover {
      background: var(--primary-dim);
      border-color: rgba(0, 210, 255, 0.25);
      transform: translateX(6px);
    }

    .feature-tag::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--primary);
    }

    /* RIGHT PANEL */
    .right-panel {
      width: 460px;
      padding: 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(0, 0, 0, 0.1);
    }

    .welcome-heading {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .welcome-subtext {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .role-selection {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      background: rgba(0, 0, 0, 0.25);
      padding: 6px;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
    }

    .role-btn {
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .role-btn:hover {
      color: white;
    }

    .role-btn.active {
      background: var(--primary-dim);
      color: var(--primary);
      box-shadow: inset 0 0 0 1px rgba(0, 210, 255, 0.3);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 15px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1);
      background: rgba(0, 0, 0, 0.6);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .eye-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      padding: 4px;
      transition: color 0.3s;
    }

    .eye-icon:hover {
      color: var(--primary);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      margin-top: 16px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
      background: #33dbff;
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    /* Responsive */
    @media (max-width: 860px) {
      .container {
        flex-direction: column;
        border-radius: 20px;
      }

      .left-panel {
        border-right: none;
        border-bottom: 1px solid var(--panel-border);
        padding: 40px 32px;
      }

      .right-panel {
        width: 100%;
        padding: 40px 32px;
      }

      .hero-title {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="brand-container">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Sandip University Logo" class="brand-logo">
        <div class="brand-text">SANDIP UNIVERSITY</div>
      </div>
      <div class="hero-content">
        <h1 class="hero-title">UniShield</h1>
        <p class="hero-desc">Secure digital access for admin , faculty and students</p>

        <div class="feature-tags">
          <div class="feature-tag">Face Recognition</div>
          <div class="feature-tag">SMS Alerts</div>
          <div class="feature-tag">Real-Time Tracking</div>
          <div class="feature-tag">Auto Blocklist</div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <h2 class="welcome-heading">Welcome Back</h2>
      <p class="welcome-subtext">Please sign in to continue</p>

      <div class="role-selection">
        <button class="role-btn active" data-role="admin" onclick="selectRole(this)">Admin</button>
        <button class="role-btn" data-role="guard" onclick="selectRole(this)">Staff</button>
        <button class="role-btn" data-role="student" onclick="selectRole(this)">Student</button>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" class="form-input" placeholder="Enter username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" placeholder="Enter password">
          <button class="eye-icon" onclick="togglePassword()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleLogin()">SIGN IN</button>
    </div>
  </div>

  <script>
    function selectRole(button) {
      document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
    }

    function togglePassword() {
      const pwd = document.getElementById('password');
      if (pwd.type === 'password') {
        pwd.type = 'text';
      } else {
        pwd.type = 'password';
      }
    }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const activeRoleBtn = document.querySelector('.role-btn.active');
      const role = activeRoleBtn ? activeRoleBtn.dataset.role : 'admin';
      const btn = document.getElementById('submitBtn');

      if (!username || !password) {
        return;
      }

      const originalText = btn.textContent;
      btn.textContent = 'SIGNING IN...';
      btn.style.opacity = '0.8';
      btn.style.pointerEvents = 'none';

      try {
        const response = await fetch("{{ url_for('auth.login') }}", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role, remember: true })
        });
        const data = await response.json();

        if (data.success) {
          btn.textContent = 'SUCCESS';
          btn.style.background = '#00f57a';
          btn.style.boxShadow = '0 0 20px rgba(0, 245, 122, 0.4)';
          window.location.href = data.redirect;
        } else {
          // Revert button on invalid credentials without explicit error alerts
          btn.textContent = originalText;
          btn.style.opacity = '1';
          btn.style.pointerEvents = 'auto';
        }
      } catch (err) {
        btn.textContent = originalText;
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      }
    }
  </script>
</body>

</html>
