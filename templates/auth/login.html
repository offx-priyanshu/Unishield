<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniShield — Sandip University Portal</title>
  <meta name="description" content="UniShield — Secure digital access for admin, faculty and students at Sandip University.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cyan: #00d4ff;
      --cyan-glow: rgba(0, 212, 255, 0.18);
      --cyan-dim: rgba(0, 212, 255, 0.08);
      --bg: #040d1a;
      --card-bg: rgba(10, 18, 36, 0.85);
      --left-bg: rgba(8, 15, 30, 0.6);
      --border: rgba(255, 255, 255, 0.07);
      --border-cyan: rgba(0, 212, 255, 0.22);
      --text: #f0f4ff;
      --muted: #6b7d9a;
      --input-bg: rgba(0, 0, 0, 0.35);
      --input-border: rgba(255, 255, 255, 0.09);
      --tag-bg: rgba(255, 255, 255, 0.04);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(ellipse at 15% 10%, #0a2040 0%, #030c1c 45%, #000810 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient particles / glows */
    body::before {
      content: '';
      position: fixed;
      bottom: -15vh;
      right: -8vw;
      width: 55vw;
      height: 55vh;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.07) 0%, transparent 65%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 6s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      top: -10vh;
      left: -5vw;
      width: 40vw;
      height: 40vh;
      background: radial-gradient(circle, rgba(0, 80, 180, 0.12) 0%, transparent 60%);
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes glowPulse {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--cyan);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) translateX(0px); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    /* === CARD === */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      max-width: 1020px;
      min-height: 580px;
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 50px 100px rgba(0,0,0,0.7),
        0 0 60px rgba(0,212,255,0.04);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ===== LEFT PANEL ===== */
    .left {
      flex: 1;
      padding: 52px 50px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--left-bg);
      position: relative;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -120px;
      width: 320px;
      height: 320px;
      background: var(--cyan);
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.09;
      pointer-events: none;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 42px;
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(0,212,255,0.3));
    }

    .brand-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }

    .brand-sub {
      font-size: 9.5px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-title {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #b8d4f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: 14.5px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 300px;
      margin-bottom: 42px;
    }

    /* Feature tags */
    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .feat {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      width: fit-content;
      cursor: default;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .feat::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.06), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .feat:hover::before {
      transform: translateX(100%);
    }

    .feat:hover {
      border-color: var(--border-cyan);
      background: var(--cyan-dim);
      transform: translateX(8px);
      color: #e0f8ff;
    }

    .feat-dot {
      width: 8px;
      height: 8px;
      min-width: 8px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(0,212,255,0.4);
      animation: dotPulse 2.5s ease-in-out infinite;
    }

    .feat:nth-child(2) .feat-dot { animation-delay: 0.3s; }
    .feat:nth-child(3) .feat-dot { animation-delay: 0.6s; }
    .feat:nth-child(4) .feat-dot { animation-delay: 0.9s; }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 8px var(--cyan), 0 0 16px rgba(0,212,255,0.35); }
      50%       { box-shadow: 0 0 14px var(--cyan), 0 0 28px rgba(0,212,255,0.6); }
    }

    /* ===== RIGHT PANEL ===== */
    .right {
      width: 440px;
      min-width: 380px;
      padding: 52px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(2, 8, 20, 0.3);
    }

    .welcome-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    /* Role Tabs */
    .role-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      position: relative;
    }

    .role-tab {
      flex: 1;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-radius: 9px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.28s ease;
      position: relative;
      z-index: 1;
    }

    .role-tab:hover {
      color: #ccd9ee;
    }

    .role-tab.active {
      background: var(--cyan-dim);
      color: var(--cyan);
      box-shadow: inset 0 0 0 1px var(--border-cyan);
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 9px;
    }

    .input-wrap {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 11px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14.5px;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,0.13);
    }

    .form-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1), 0 0 12px rgba(0,212,255,0.08);
      background: rgba(0,0,0,0.5);
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color 0.25s;
    }

    .eye-btn:hover {
      color: var(--cyan);
    }

    /* Error box */
    .err-box {
      display: none;
      background: rgba(255, 55, 90, 0.1);
      border: 1px solid rgba(255, 55, 90, 0.28);
      color: #ff7a90;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 500;
      margin-bottom: 14px;
      animation: errShake 0.4s ease;
    }

    @keyframes errShake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    /* Sign In Button */
    .sign-btn {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      background: var(--cyan);
      color: #010d1a;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 24px rgba(0,212,255,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
      position: relative;
      overflow: hidden;
    }

    .sign-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    .sign-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,212,255,0.5), 0 1px 0 rgba(255,255,255,0.25) inset;
      background: #1adeff;
    }

    .sign-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 12px rgba(0,212,255,0.3);
    }

    .sign-btn.loading {
      opacity: 0.85;
      pointer-events: none;
    }

    .sign-btn.success {
      background: #00e676;
      box-shadow: 0 4px 24px rgba(0,230,118,0.45);
      color: #012010;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .card {
        flex-direction: column;
      }
      .left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 36px 32px;
      }
      .hero-title { font-size: 38px; }
      .right {
        width: 100%;
        min-width: unset;
        padding: 36px 32px;
      }
    }
  </style>
</head>

<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left">
      <div class="brand">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Sandip University" class="brand-logo">
        <div class="brand-info">
          <span class="brand-name">Sandip University</span>
          <span class="brand-sub">NAAC Recognised</span>
        </div>
      </div>

      <div class="hero">
        <h1 class="hero-title">UniShield</h1>
        <p class="hero-desc">Secure digital access for admin, faculty and students</p>

        <div class="features">
          <div class="feat"><span class="feat-dot"></span>Face Recognition</div>
          <div class="feat"><span class="feat-dot"></span>SMS Alerts</div>
          <div class="feat"><span class="feat-dot"></span>Real-Time Tracking</div>
          <div class="feat"><span class="feat-dot"></span>Auto Blocklist</div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <h2 class="welcome-title">Welcome Back</h2>
      <p class="welcome-sub">Please sign in to continue</p>

      <!-- Role Tabs -->
      <div class="role-tabs">
        <button class="role-tab active" id="tab-admin"    data-role="admin"    onclick="selectRole(this)">Admin</button>
        <button class="role-tab"        id="tab-guard"   data-role="guard"    onclick="selectRole(this)">Staff</button>
        <button class="role-tab"        id="tab-student" data-role="student"  onclick="selectRole(this)">Student</button>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="username">USERNAME</label>
        <div class="input-wrap">
          <input type="text" id="username" class="form-input" placeholder="Enter username" autocomplete="username">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">PASSWORD</label>
        <div class="input-wrap">
          <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="current-password">
          <button class="eye-btn" id="eyeBtn" onclick="togglePwd()" type="button" aria-label="Toggle password visibility">
            <!-- Eye Open -->
            <svg id="eyeOpen" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye Off -->
            <svg id="eyeOff" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="err-box" id="errBox"></div>

      <!-- Submit -->
      <button class="sign-btn" id="signBtn" onclick="handleLogin()">SIGN IN</button>
    </div>
  </div>

  <script>
    /* === Particles === */
    (function () {
      const container = document.getElementById('particles');
      for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          width: ${Math.random() * 2.5 + 1}px;
          height: ${Math.random() * 2.5 + 1}px;
          animation-duration: ${Math.random() * 18 + 12}s;
          animation-delay: ${Math.random() * 12}s;
          opacity: 0;
        `;
        container.appendChild(p);
      }
    })();

    /* === Role Selection === */
    function selectRole(btn) {
      document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    /* === Toggle Password === */
    function togglePwd() {
      const pwd = document.getElementById('password');
      const open = document.getElementById('eyeOpen');
      const off  = document.getElementById('eyeOff');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        open.style.display = 'none';
        off.style.display  = 'block';
      } else {
        pwd.type = 'password';
        open.style.display = 'block';
        off.style.display  = 'none';
      }
    }

    /* === Show Error === */
    function showError(msg) {
      const box = document.getElementById('errBox');
      box.textContent = '⚠ ' + msg;
      box.style.display = 'block';
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = 'errShake 0.4s ease';
    }

    /* === Login === */
    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const role     = document.querySelector('.role-tab.active').dataset.role;
      const btn      = document.getElementById('signBtn');
      const errBox   = document.getElementById('errBox');

      if (!username || !password) {
        showError('Please enter username and password.');
        return;
      }

      errBox.style.display = 'none';
      btn.textContent = 'Signing in…';
      btn.classList.add('loading');

      try {
        const res  = await fetch("{{ url_for('auth.login') }}", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role, remember: true })
        });
        const data = await res.json();

        if (data.success) {
          btn.textContent = '✓  Access Granted';
          btn.classList.remove('loading');
          btn.classList.add('success');
          setTimeout(() => { window.location.href = data.redirect; }, 600);
        } else {
          btn.textContent = 'Sign In';
          btn.classList.remove('loading');
          showError(data.message || 'Invalid credentials. Check username, password & role.');
        }
      } catch {
        btn.textContent = 'Sign In';
        btn.classList.remove('loading');
        showError('Connection error. Please try again.');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
