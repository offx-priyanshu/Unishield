{% extends "layout.html" %}

{% block page_title %}New Outpass Request{% endblock %}

{% block content %}
<div class="glass-card animate-fade" style="max-width: 650px; margin: 0 auto; padding: 2.5rem;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <div style="width: 64px; height: 64px; background: rgba(59, 130, 241, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
            <i class="fas fa-file-pen" style="font-size: 1.5rem; color: var(--primary);"></i>
        </div>
        <h2 style="font-size: 1.5rem; font-weight: 700;">Request Departure</h2>
        <p style="color: var(--text-muted); font-size: 0.875rem;">Provide valid details for security verification</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Travel Destination</label>
            <input type="text" name="destination" placeholder="e.g. Local Market, Home" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label>Travel Purpose</label>
            <textarea name="reason" placeholder="Brief explanation of why you need to go out..." class="form-input" style="min-height: 120px;" required></textarea>
        </div>
        
        <div class="form-group">
            <label>Expected Duration</label>
            <select name="hours" class="form-input" style="appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2394a3b8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.25rem;">
                <option value="1">1 Hour</option>
                <option value="2" selected>2 Hours</option>
                <option value="4">4 Hours</option>
                <option value="8">8 Hours (Full Day)</option>
                <option value="12">12 Hours (Half Day)</option>
                <option value="24">24 Hours (Overnight)</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 3rem;">
            <a href="{{ url_for('student.dashboard') }}" class="btn" style="background: var(--glass-bg); flex: 1; text-align: center;">Cancel</a>
            <button type="submit" class="btn" style="flex: 2;">
                Generate Request <i class="fas fa-chevron-right" style="font-size: 0.8rem; margin-left: 0.5rem;"></i>
            </button>
        </div>
    </form>
</div>
{% endblock %}
